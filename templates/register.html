{% extends "base.html" %}

{% block title %}Register - FinSight AI{% endblock %}
{% block body_class %}auth-body{% endblock %}

{% block body %}
<div class="auth-wrapper">
  <a href="{{ url_for('home') }}" class="back-home">Back to Home</a>
  {% include "_flash_messages.html" %}
  <div class="auth-card">
    <h2>Create Account</h2>
    <form action="{{ url_for('register_post') }}" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <input type="text" name="name" placeholder="Full Name" required />
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password (8+ characters)" required />
      <button type="submit" class="btn-primary">Register</button>
    </form>
    <div class="auth-footer">
      Already have an account?
      <a href="{{ url_for('signin') }}">Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
