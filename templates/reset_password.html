{% extends "base.html" %}

{% block title %}Set New Password - FinSight AI{% endblock %}
{% block body_class %}auth-body{% endblock %}

{% block body %}
<div class="auth-wrapper">
  <a href="{{ url_for('signin') }}" class="back-home">Back to Sign In</a>
  {% include "_flash_messages.html" %}
  <div class="auth-card">
    <h2>Set New Password</h2>
    <p class="auth-helper">Choose a new password with at least 8 characters.</p>
    <form action="{{ url_for('reset_password_post', token=token) }}" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <input type="password" name="password" placeholder="New password" minlength="8" required />
      <input type="password" name="confirm_password" placeholder="Confirm new password" minlength="8" required />
      <button type="submit" class="btn-primary">Reset Password</button>
    </form>
  </div>
</div>
{% endblock %}
